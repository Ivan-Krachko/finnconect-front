<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Cobro - FinConnect Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #080E0B;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      margin: 0;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 24px; }
    .qr-container {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 24px;
    }
    #qrcode { display: flex; justify-content: center; }
    #qrcode canvas { border-radius: 8px; }
    .info {
      background: #111B16;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      max-width: 320px;
      word-break: break-all;
    }
    .info strong { color: #1FA774; }
    input, button {
      margin: 8px 0;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 16px;
    }
    input {
      width: 100%;
      max-width: 280px;
      background: #111B16;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
    }
    button {
      background: #1FA774;
      color: #fff;
      border: none;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 24px;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>QR Cobro</h1>
  <p>Escaneá para probar "Pagar con QR"</p>

  <div class="qr-container">
    <div id="qrcode"></div>
  </div>

  <div class="info">
    <strong>Alias:</strong> <span id="aliasVal">test.cobro.finconnect</span><br>
    <strong>Monto:</strong> $<span id="montoVal">1000</span> ARS
  </div>

  <div style="margin-top: 24px; text-align: center;">
    <input type="text" id="alias" placeholder="Alias" value="test.cobro.finconnect">
    <input type="text" id="monto" placeholder="Monto" value="1000">
    <button onclick="actualizarQR()">Generar nuevo QR</button>
  </div>

  <script>
    function generarQRData(alias, monto, moneda) {
      const params = new URLSearchParams({ alias, monto, moneda: moneda || 'ARS' });
      return 'finconnectapp://cobrar?' + params.toString();
    }

    function actualizarQR() {
      const alias = document.getElementById('alias').value || 'test.cobro.finconnect';
      const monto = document.getElementById('monto').value || '1000';
      const data = generarQRData(alias, monto, 'ARS');

      document.getElementById('aliasVal').textContent = alias;
      document.getElementById('montoVal').textContent = monto;

      const container = document.getElementById('qrcode');
      container.innerHTML = '';
      new QRCode(container, { text: data, width: 220, height: 220 });
    }

    actualizarQR();
  </script>
</body>
</html>
